name: CI & Publish

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:  # Или вручную через UI

permissions:
  id-token: write  # Required for npm OIDC trusted publishing
  contents: write  # Required for git tags

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bunx tsc --noEmit

      - name: Lint
        run: bunx eslint packages/

      - name: Pre-pull testcontainer images
        run: docker pull redis:7-alpine & docker pull nats:2.10-alpine & wait

      - name: Test with coverage
        env:
          TESTCONTAINERS_RYUK_DISABLED: 'true'
        run: bun test --reporter=default --reporter=junit --reporter-outfile=test-results.xml --coverage --coverage-reporter=lcov

      - name: Extract test count for badge
        if: github.ref == 'refs/heads/master'
        run: |
          # Parse test count from JUnit XML
          TESTS=$(grep -oP 'tests="\K[0-9]+' test-results.xml | head -1)
          FAILURES=$(grep -oP 'failures="\K[0-9]+' test-results.xml | head -1)

          if [ "$FAILURES" = "0" ]; then
            echo "BADGE_COLOR=brightgreen" >> "$GITHUB_ENV"
          else
            echo "BADGE_COLOR=red" >> "$GITHUB_ENV"
          fi

          echo "TEST_COUNT=${TESTS}" >> "$GITHUB_ENV"

      # NOTE: To enable the test badge, you need to:
      # 1. Create a GitHub Gist and copy its ID
      # 2. Create a Personal Access Token (PAT) with gist scope
      # 3. Add the PAT as a repository secret named GIST_TOKEN
      # 4. Replace bde6a4c4930c19a963199fa0bea2b265 below with your actual Gist ID
      - name: Update test badge
        if: github.ref == 'refs/heads/master'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: bde6a4c4930c19a963199fa0bea2b265
          filename: onebun-test-badge.json
          label: tests
          message: ${{ env.TEST_COUNT }} passed
          color: ${{ env.BADGE_COLOR }}

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}  # Optional for public repos, but recommended
          files: ./coverage/lcov.info
          fail_ci_if_error: false
          verbose: true

      - name: Publish packages
        # Publish only on push to master or manual trigger (not on PRs)
        if: (github.event_name == 'push' && github.ref == 'refs/heads/master') || github.event_name == 'workflow_dispatch'
        run: bun run publish:packages

name: Benchmarks

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 0'  # Weekly, Sunday 3am UTC
  push:
    branches: [master]
    paths:
      - 'packages/core/src/**'
      - 'packages/requests/src/**'
      - 'packages/logger/src/**'
      - 'packages/trace/src/**'
      - 'packages/metrics/src/**'
      - 'packages/envs/src/**'
      - 'packages/drizzle/src/**'
      - 'packages/cache/src/**'
      - 'packages/docs/src/**'
      - 'benchmarks/**'
      - '!**/*.test.ts'
      - '!**/testing/**'

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: bench
          POSTGRES_PASSWORD: bench
          POSTGRES_DB: bench
        ports:
          - 5499:5432
        options: >-
          --tmpfs /var/lib/postgresql/data
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: bun install

      - name: Install bombardier
        run: |
          curl -L https://github.com/codesenberg/bombardier/releases/download/v1.2.6/bombardier-linux-amd64 -o /usr/local/bin/bombardier
          chmod +x /usr/local/bin/bombardier

      - name: Install benchmark dependencies
        run: |
          cd benchmarks/simple/competitors/hono-bun && bun install
          cd ../elysia && bun install
          cd ../nestjs-fastify && bun install && bun run build
          cd ../../../../realistic/nestjs-fastify && bun install && npm install && bun run build
          cd ../../realistic-pg/nestjs-fastify && bun install && bun run build
          cd ../nestjs-typeorm && bun install && bun run build

      - name: Run all benchmarks
        run: ./benchmarks/run-all.sh

      - name: Parse results
        run: bun run benchmarks/parse-results.ts

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmarks/results/

      - name: Upload results to Gist
        if: github.ref == 'refs/heads/master' || github.event_name == 'schedule'
        run: bun run benchmarks/upload-gist.ts
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          BENCHMARK_GIST_ID: ${{ secrets.BENCHMARK_GIST_ID }}

name: Benchmarks

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 0'  # Weekly, Sunday 3am UTC
  push:
    branches: [master]
    paths:
      - 'packages/core/src/**'
      - 'packages/requests/src/**'
      - 'packages/logger/src/**'
      - 'packages/trace/src/**'
      - 'packages/metrics/src/**'
      - 'packages/envs/src/**'
      - 'benchmarks/**'

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: bun install

      - name: Install bombardier
        run: |
          curl -L https://github.com/codesenberg/bombardier/releases/download/v1.2.6/bombardier-linux-amd64 -o /usr/local/bin/bombardier
          chmod +x /usr/local/bin/bombardier

      - name: Install benchmark dependencies
        run: |
          cd benchmarks/competitors/hono-bun && bun install
          cd ../elysia && bun install
          cd ../nestjs-fastify && bun install && bun run build

      - name: Run HTTP benchmarks
        run: ./benchmarks/run-http.sh

      - name: Run startup benchmarks
        run: ./benchmarks/startup.sh

      - name: Parse results
        run: bun run benchmarks/parse-results.ts

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmarks/results/

      - name: Upload results to Gist
        if: github.ref == 'refs/heads/master' || github.event_name == 'schedule'
        run: bun run benchmarks/upload-gist.ts
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          BENCHMARK_GIST_ID: ${{ secrets.BENCHMARK_GIST_ID }}
